<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background: deep green (corrected from indigo — InvoiceGuard is emerald) -->
  <rect width="128" height="128" rx="24" fill="#0d1a15"/>
  <g transform="translate(64,64)">
    <!-- Receipt body (emerald, semi-transparent fill) -->
    <path d="M-22-36h44v52l-7-5-7 5-7-5-7 5-7-5-7 5V-36Z"
          fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Receipt lines -->
    <path d="M-12-20h24M-12-10h16" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Clock badge -->
    <circle cx="16" cy="22" r="16" fill="#0d1a15" stroke="#10b981" stroke-width="2"/>
    <circle cx="16" cy="22" r="13" fill="#10b981"/>
    <path d="M16 16v7l5 5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
