<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <rect width="400" height="225" fill="#FFF5F0"/>
  <!-- Workflow nodes + connectors -->
  <!-- Node 1 (start) -->
  <rect x="48" y="96" width="64" height="34" rx="10" fill="#EA580C"/>
  <rect x="60" y="108" width="40" height="6" rx="2" fill="white" opacity="0.85"/>
  <rect x="60" y="119" width="28" height="4" rx="2" fill="white" opacity="0.5"/>
  <!-- arrow -->
  <line x1="112" y1="113" x2="148" y2="113" stroke="#FED7AA" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="145,108 151,113 145,118" stroke="#FED7AA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Node 2 -->
  <rect x="152" y="96" width="64" height="34" rx="10" fill="#F97316" opacity="0.85"/>
  <rect x="164" y="108" width="40" height="6" rx="2" fill="white" opacity="0.85"/>
  <rect x="164" y="119" width="30" height="4" rx="2" fill="white" opacity="0.5"/>
  <!-- arrow to split -->
  <line x1="216" y1="113" x2="250" y2="113" stroke="#FED7AA" stroke-width="2.5" stroke-linecap="round"/>
  <!-- split lines -->
  <line x1="250" y1="113" x2="250" y2="80" stroke="#FED7AA" stroke-width="2" stroke-linecap="round"/>
  <line x1="250" y1="113" x2="250" y2="146" stroke="#FED7AA" stroke-width="2" stroke-linecap="round"/>
  <line x1="250" y1="80" x2="270" y2="80" stroke="#FED7AA" stroke-width="2" stroke-linecap="round"/>
  <line x1="250" y1="146" x2="270" y2="146" stroke="#FED7AA" stroke-width="2" stroke-linecap="round"/>
  <!-- Node 3a (top) -->
  <rect x="270" y="63" width="64" height="34" rx="10" fill="#FDBA74" opacity="0.9"/>
  <rect x="282" y="75" width="40" height="6" rx="2" fill="#7C2D12" opacity="0.5"/>
  <rect x="282" y="86" width="28" height="4" rx="2" fill="#7C2D12" opacity="0.3"/>
  <!-- Node 3b (bottom) -->
  <rect x="270" y="129" width="64" height="34" rx="10" fill="#FDBA74" opacity="0.9"/>
  <rect x="282" y="141" width="40" height="6" rx="2" fill="#7C2D12" opacity="0.5"/>
  <rect x="282" y="152" width="28" height="4" rx="2" fill="#7C2D12" opacity="0.3"/>
  <!-- small label -->
  <rect x="152" y="142" width="64" height="18" rx="9" fill="#FFF5F0" stroke="#FED7AA" stroke-width="1.5"/>
  <rect x="164" y="148" width="40" height="5" rx="2" fill="#EA580C" opacity="0.4"/>
</svg>
