<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <rect width="400" height="225" fill="#EEF2FF"/>
  <!-- Chat bubbles -->
  <rect x="80" y="48" width="180" height="44" rx="14" fill="#6366F1"/>
  <rect x="80" y="100" width="140" height="44" rx="14" fill="#818CF8" opacity="0.7"/>
  <rect x="80" y="152" width="160" height="44" rx="14" fill="#A5B4FC" opacity="0.5"/>
  <!-- bubble tails -->
  <polygon points="80,82 66,92 80,92" fill="#6366F1"/>
  <polygon points="80,134 66,144 80,144" fill="#818CF8" opacity="0.7"/>
  <!-- text lines in bubbles -->
  <rect x="96" y="64" width="120" height="7" rx="3" fill="white" opacity="0.85"/>
  <rect x="96" y="77" width="80" height="7" rx="3" fill="white" opacity="0.55"/>
  <rect x="96" y="116" width="100" height="7" rx="3" fill="white" opacity="0.8"/>
  <rect x="96" y="168" width="115" height="7" rx="3" fill="white" opacity="0.7"/>
  <!-- sparkle -->
  <line x1="316" y1="56" x2="316" y2="68" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="310" y1="62" x2="322" y2="62" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="300" cy="80" r="4" fill="#C7D2FE"/>
  <circle cx="320" cy="88" r="3" fill="#A5B4FC"/>
</svg>
