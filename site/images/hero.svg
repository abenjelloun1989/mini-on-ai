<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Soft background blobs -->
  <ellipse cx="340" cy="210" rx="160" ry="130" fill="#EEF2FF" opacity="0.8"/>
  <ellipse cx="110" cy="270" rx="95" ry="75" fill="#E0E7FF" opacity="0.5"/>

  <!-- Ground shadow -->
  <ellipse cx="242" cy="328" rx="118" ry="11" fill="#C7D2FE" opacity="0.3"/>

  <!-- ── Back card (rotated left) ───────────────── -->
  <g transform="rotate(-10 210 195) translate(62 88)">
    <rect width="195" height="145" rx="14" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
    <!-- top color strip -->
    <rect width="195" height="38" rx="14" fill="#818CF8"/>
    <rect y="24" width="195" height="14" fill="#818CF8"/>
    <rect x="18" y="12" width="80" height="8" rx="3" fill="white" opacity="0.85"/>
    <!-- body lines -->
    <rect x="18" y="54" width="150" height="7" rx="3" fill="#DDD6FE"/>
    <rect x="18" y="68" width="125" height="7" rx="3" fill="#DDD6FE"/>
    <rect x="18" y="82" width="138" height="7" rx="3" fill="#DDD6FE"/>
    <!-- checklist rows -->
    <circle cx="26" cy="108" r="8" fill="#DDD6FE"/>
    <polyline points="22,108 25,111 31,105" stroke="#818CF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="42" y="104" width="70" height="7" rx="3" fill="#EDE9FE"/>
    <circle cx="26" cy="126" r="8" fill="#DDD6FE"/>
    <polyline points="22,126 25,129 31,123" stroke="#818CF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="42" y="122" width="55" height="7" rx="3" fill="#EDE9FE"/>
  </g>

  <!-- ── Front card (main, slight right tilt) ──── -->
  <g transform="rotate(6 255 195) translate(148 64)">
    <!-- card shadow -->
    <rect x="4" y="8" width="220" height="175" rx="16" fill="#6366F1" opacity="0.1"/>
    <!-- card -->
    <rect width="220" height="175" rx="16" fill="white" stroke="#E0E7FF" stroke-width="1.5"/>
    <!-- header strip -->
    <rect width="220" height="46" rx="16" fill="#6366F1"/>
    <rect y="30" width="220" height="16" fill="#6366F1"/>
    <rect x="18" y="14" width="95" height="9" rx="3" fill="white" opacity="0.9"/>
    <rect x="18" y="28" width="62" height="6" rx="3" fill="white" opacity="0.45"/>
    <!-- body lines -->
    <rect x="18" y="62" width="168" height="8" rx="3" fill="#E5E7EB"/>
    <rect x="18" y="78" width="140" height="8" rx="3" fill="#E5E7EB"/>
    <rect x="18" y="94" width="155" height="8" rx="3" fill="#E5E7EB"/>
    <rect x="18" y="110" width="105" height="8" rx="3" fill="#E5E7EB"/>
    <!-- CTA button -->
    <rect x="18" y="134" width="106" height="28" rx="8" fill="#6366F1"/>
    <rect x="30" y="144" width="66" height="7" rx="3" fill="white" opacity="0.9"/>
    <!-- small badge -->
    <rect x="138" y="134" width="64" height="28" rx="8" fill="#EEF2FF"/>
    <rect x="148" y="144" width="42" height="7" rx="3" fill="#6366F1" opacity="0.55"/>
  </g>

  <!-- ── Floating chip: "Prompt Pack" ─────────── -->
  <g transform="rotate(-7 75 152)">
    <rect x="38" y="140" width="90" height="28" rx="14" fill="white" stroke="#E0E7FF" stroke-width="1.5"/>
    <circle cx="58" cy="154" r="8" fill="#EEF2FF"/>
    <rect x="57" y="150" width="2.5" height="8" rx="1" fill="#6366F1"/>
    <rect x="53" y="153" width="8" height="2.5" rx="1" fill="#6366F1"/>
    <rect x="72" y="150" width="46" height="7" rx="3" fill="#E5E7EB"/>
  </g>

  <!-- ── Floating chip: "25 prompts" ──────────── -->
  <g transform="rotate(9 390 95)">
    <rect x="362" y="82" width="76" height="26" rx="13" fill="#6366F1"/>
    <rect x="375" y="92" width="50" height="6" rx="3" fill="white" opacity="0.85"/>
  </g>

  <!-- ── Sparkle top right ──────────────────────  -->
  <g opacity="0.9">
    <line x1="418" y1="48" x2="418" y2="72" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="406" y1="60" x2="430" y2="60" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="410" y1="52" x2="426" y2="68" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="426" y1="52" x2="410" y2="68" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- ── Small sparkle bottom left ─────────────── -->
  <g opacity="0.55">
    <line x1="62" y1="205" x2="62" y2="217" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/>
    <line x1="56" y1="211" x2="68" y2="211" stroke="#818CF8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ── Dot cluster top left ───────────────────── -->
  <circle cx="96" cy="78" r="5" fill="#A5B4FC" opacity="0.7"/>
  <circle cx="112" cy="64" r="3.5" fill="#C7D2FE" opacity="0.6"/>
  <circle cx="82" cy="62" r="3" fill="#818CF8" opacity="0.5"/>

  <!-- ── Dot cluster right ──────────────────────── -->
  <circle cx="454" cy="170" r="5.5" fill="#A5B4FC" opacity="0.6"/>
  <circle cx="466" cy="190" r="3" fill="#C7D2FE" opacity="0.55"/>
  <circle cx="445" cy="192" r="3.5" fill="#E0E7FF" opacity="0.7"/>
</svg>
