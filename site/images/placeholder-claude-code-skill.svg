<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <rect width="400" height="225" fill="#ECFDF5"/>
  <!-- Terminal window -->
  <rect x="80" y="45" width="240" height="150" rx="10" fill="white" stroke="#A7F3D0" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="80" y="45" width="240" height="32" rx="10" fill="#D1FAE5"/>
  <rect x="80" y="61" width="240" height="16" fill="#D1FAE5"/>
  <!-- Traffic lights -->
  <circle cx="104" cy="61" r="5" fill="#FCA5A5"/>
  <circle cx="120" cy="61" r="5" fill="#FCD34D"/>
  <circle cx="136" cy="61" r="5" fill="#6EE7B7"/>
  <!-- Title text bar -->
  <rect x="155" y="56" width="90" height="10" rx="4" fill="#A7F3D0" opacity="0.6"/>
  <!-- Code lines in terminal -->
  <!-- claude prefix in green -->
  <rect x="100" y="95" width="40" height="7" rx="2" fill="#065F46" opacity="0.7"/>
  <!-- command text -->
  <rect x="146" y="95" width="80" height="7" rx="2" fill="#6EE7B7" opacity="0.8"/>
  <!-- second line: output -->
  <rect x="100" y="111" width="16" height="7" rx="2" fill="#A7F3D0" opacity="0.5"/>
  <rect x="122" y="111" width="120" height="7" rx="2" fill="#374151" opacity="0.3"/>
  <!-- third line -->
  <rect x="100" y="127" width="16" height="7" rx="2" fill="#A7F3D0" opacity="0.5"/>
  <rect x="122" y="127" width="100" height="7" rx="2" fill="#374151" opacity="0.3"/>
  <!-- fourth line: skill activation badge -->
  <rect x="100" y="150" width="110" height="14" rx="5" fill="#065F46" opacity="0.12"/>
  <rect x="108" y="154" width="60" height="6" rx="2" fill="#065F46" opacity="0.5"/>
  <!-- cursor blink -->
  <rect x="222" y="150" width="8" height="14" rx="1" fill="#065F46" opacity="0.35"/>
  <!-- Skills icon top right -->
  <circle cx="300" cy="78" r="22" fill="#D1FAE5"/>
  <text x="300" y="84" text-anchor="middle" font-size="18" fill="#065F46">⚡</text>
  <!-- decorative dots -->
  <circle cx="340" cy="130" r="4" fill="#6EE7B7" opacity="0.5"/>
  <circle cx="352" cy="118" r="3" fill="#A7F3D0" opacity="0.4"/>
  <circle cx="330" cy="148" r="2.5" fill="#6EE7B7" opacity="0.35"/>
</svg>
