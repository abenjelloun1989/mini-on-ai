<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobGuard — Settings</title>
  <style>
    :root { --bg:#0f0f1a; --surface:#1a1a2e; --border:#2a2a45; --text:#e2e2f0; --text-muted:#8b8bab; --accent:#F59E0B; --danger:#ef4444; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:13px; background:var(--bg); color:var(--text); max-width:520px; margin:40px auto; padding:0 20px; }
    h1 { font-size:18px; margin-bottom:24px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px; margin-bottom:16px; }
    .card-title { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin-bottom:10px; }
    .row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .label { font-size:13px; }
    .muted { font-size:11px; color:var(--text-muted); margin-top:3px; }
    .uid { font-family:monospace; font-size:11px; color:var(--text-muted); }
    button { padding:8px 14px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text); }
    button:hover { border-color:var(--accent); }
    .btn-danger { color:var(--danger); border-color:var(--danger); }
    .btn-danger:hover { background:rgba(239,68,68,.08); }
  </style>
</head>
<body>
  <h1>🛡 JobGuard Settings</h1>

  <div class="card">
    <div class="card-title">Account</div>
    <div class="row">
      <div>
        <div class="label">Extension ID</div>
        <div class="uid" id="userId">Loading…</div>
      </div>
      <button id="copyIdBtn">Copy ID</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Support</div>
    <div class="row">
      <div>
        <div class="label">Contact support</div>
        <div class="muted">Include your Extension ID when writing in</div>
      </div>
      <a href="mailto:hello@mini-on-ai.com?subject=JobGuard%20Support" style="text-decoration:none;">
        <button>Email us</button>
      </a>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Danger Zone</div>
    <div class="row">
      <div>
        <div class="label" style="color:var(--danger)">Delete my account</div>
        <div class="muted">Permanently deletes all your data. Cannot be undone.</div>
      </div>
      <button class="btn-danger" id="deleteAccountBtn">Delete</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
