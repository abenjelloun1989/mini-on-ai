<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobGuard</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- SVG icon sprite — populated by icons-loader.js -->
  <script src="icons-loader.js"></script>
  <div class="popup">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <img src="../icons/icon48.png" width="20" height="20" alt="" aria-hidden="true" style="border-radius:4px;">
        <span class="header-title">JobGuard</span>
        <span class="tier-badge tier-badge--free" id="tierBadge">Free</span>
      </div>
      <div class="header-right">
        <button class="btn-theme" id="darkModeToggle" title="Toggle theme" aria-label="Toggle theme">
          <span class="icon-moon">Light</span>
          <span class="icon-sun">Dark</span>
        </button>
        <button class="btn-icon" id="headerExpandBtn" title="Open full report" aria-label="Open full report">⤢</button>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="analyze">Analyze</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="account">Account</button>
    </nav>

    <!-- ── Analyze Tab ─────────────────────────────────────────────────── -->
    <div class="tab-content active" id="tab-analyze">

      <!-- Input area -->
      <div class="input-section" id="inputSection">
        <div class="input-actions">
          <button class="btn-page" id="analyzePageBtn" title="Extract text from the current job posting page">
            📄 Analyze current page
          </button>
        </div>
        <div class="divider-or"><span>or paste below</span></div>
        <textarea
          id="postingText"
          class="posting-textarea"
          placeholder="Paste the job posting text here…"
          rows="8"
          maxlength="15000"
        ></textarea>
        <div class="textarea-footer">
          <span class="char-count" id="charCount">0 / 15,000</span>
          <button class="btn-primary" id="analyzeBtn" disabled>Analyze posting</button>
        </div>
      </div>

      <!-- Loading -->
      <div class="loading-state" id="loadingState" style="display:none;">
        <div class="shield-anim"><img src="../icons/icon48.png" width="48" height="48" style="border-radius:10px;"></div>
        <p class="loading-text">Analyzing posting…</p>
      </div>

      <!-- Results -->
      <div class="results" id="results" style="display:none;"></div>

      <!-- Upgrade banner -->
      <div class="upgrade-banner" id="upgradeBanner" style="display:none;">
        <p>You've used all <strong>5 free analyses</strong> this month.</p>
        <button class="btn-upgrade" id="upgradeBannerBtn">Upgrade to Pro — $7/month</button>
      </div>

    </div>

    <!-- ── History Tab ──────────────────────────────────────────────────── -->
    <div class="tab-content" id="tab-history" style="display:none;">
      <div class="history-list" id="historyList"></div>
    </div>

    <!-- ── Account Tab ─────────────────────────────────────────────────── -->
    <div class="tab-content" id="tab-account" style="display:none;">

      <div class="account-section">
        <div class="account-card">
          <div class="account-card-label">Current plan</div>
          <div class="account-card-value" id="accountTier">Free</div>
        </div>
        <div class="account-card">
          <div class="account-card-label">Analyses this month</div>
          <div class="account-card-value" id="accountUsage">0 / 5</div>
        </div>
      </div>

      <!-- Free user actions -->
      <div id="freeActions">
        <button class="btn-primary btn-full" id="upgradeBtn">Upgrade to Pro — $7/month</button>
        <div class="ltd-section">
          <p class="ltd-label">Have a lifetime deal code?</p>
          <div class="ltd-row">
            <input type="text" id="ltdCodeInput" class="ltd-input" placeholder="XXXX-XXXX-XXXX" />
            <button class="btn-secondary" id="redeemBtn">Redeem</button>
          </div>
          <p class="ltd-message" id="ltdMessage"></p>
        </div>
      </div>

      <!-- Pro user actions -->
      <div id="proActions" style="display:none;">
        <div class="pro-badge-row">
          <span class="pro-badge">✓ Pro — Unlimited analyses</span>
        </div>
        <button class="btn-secondary btn-full" id="manageSubBtn">Manage subscription</button>
      </div>

    </div>

  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
